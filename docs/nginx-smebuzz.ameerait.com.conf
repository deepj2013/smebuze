# Nginx config for smebuze.ameerait.com
# Copy to /etc/nginx/sites-available/smebuze.ameerait.com then:
#   sudo ln -s /etc/nginx/sites-available/smebuze.ameerait.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then run: sudo certbot --nginx -d smebuze.ameerait.com

# Before SSL (Certbot will add SSL and redirect):
server {
    listen 80;
    server_name smebuze.ameerait.com;

    location /api {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
